name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build SmartDiff.exe
    runs-on: windows-latest
    env:
      # Test scripts print Chinese; the Windows runner defaults to cp1252
      PYTHONUTF8: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # all tags, to locate the previous release for the notes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: |
          python tests/test_merger.py
          python tests/test_differ.py
          python tests/test_updater.py
          python tests/test_api_merge.py

      - name: Build executable
        run: >
          pyinstaller --noconfirm --onefile --console
          --name SmartDiff
          --add-data "static;static"
          server.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartDiff
          path: dist/SmartDiff.exe

      - name: Extract release notes from changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          echo "Previous tag: ${PREV_TAG:-<none>}"
          python .github/release_notes.py "${GITHUB_REF_NAME}" "${PREV_TAG}" > release_notes.md
          echo "title=$(python .github/release_notes.py --title "${GITHUB_REF_NAME}")" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.title }}
          files: dist/SmartDiff.exe
          body_path: release_notes.md
